<div class="notifications-page">
  <div class="page-header d-flex justify-content-between align-items-center mb-4">
    <div class="header-left">
      <h1 class="greeting">Notifications</h1>
      <p class="subtitle text-muted">Stay updated with your latest activity.</p>
    </div>
    <div class="header-right">
      <button class="btn btn-outline-primary rounded-3 d-flex align-items-center gap-2" (click)="markAllRead()" *ngIf="unreadCount() > 0">
        <mat-icon>done_all</mat-icon>
        Mark all as read
      </button>
    </div>
  </div>

  <div class="notifications-container">
    <div class="loading-state text-center py-5" *ngIf="loading()">
      <span class="spinner-border spinner-border-sm me-2"></span> Loading...
    </div>

    <div class="empty-state" *ngIf="!loading() && visibleNotifications().length === 0">
      <div class="empty-icon-wrap">
        <mat-icon>notifications_off</mat-icon>
      </div>
      <p class="empty-title">You're all caught up!</p>
      <p class="empty-sub">No notifications at the moment.</p>
    </div>

    <div class="notification-list" *ngIf="!loading() && visibleNotifications().length > 0" [@listAnim]="visibleNotifications().length">
      
      <div class="notif-item" *ngFor="let n of visibleNotifications()" [class.unread]="!n.isRead" [@itemLeave] (click)="markAsRead(n.id)">
        <div class="notif-icon" [style.background]="getTypeBg(n.type)">
          <mat-icon [style.color]="getTypeColor(n.type)">{{ getTypeIcon(n.type) }}</mat-icon>
        </div>

        <div class="notif-content">
          <div class="notif-top">
            <span class="notif-title">{{ n.title }}</span>
            <span class="notif-time">{{ formatTime(n.createdAt) }}</span>
          </div>
          <p class="notif-message">{{ n.message }}</p>
        </div>

        <div class="notif-actions">
          <button class="action-icon" (click)="markAsRead(n.id); $event.stopPropagation()" *ngIf="!n.isRead" title="Mark as read">
            <mat-icon>check_circle_outline</mat-icon>
          </button>
          <button class="action-icon dismiss" (click)="dismiss(n.id, $event)" title="Delete">
            <mat-icon>delete_outline</mat-icon>
          </button>
        </div>

        <div class="unread-dot" *ngIf="!n.isRead"></div>
      </div>
      
    </div>
  </div>
</div>
