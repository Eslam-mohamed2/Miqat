<div class="main-calendar-container">
  
  <div class="calendar-header">
    <div class="calendar-header-left">
      <div class="nav-arrows">
        <button class="icon-btn" (click)="prevMonth()"><mat-icon>chevron_left</mat-icon></button>
        <button class="icon-btn" (click)="nextMonth()"><mat-icon>chevron_right</mat-icon></button>
      </div>
      <h2 class="month-title">{{ currentMonthValue | date:'MMMM yyyy' }}</h2>
      <button class="today-btn" (click)="setToday()">Today</button>
    </div>

    <div class="calendar-header-right">
      <div class="timezone-selector">
        <mat-icon class="tz-icon">language</mat-icon>
        <span>PST (GMT-8)</span>
        <mat-icon class="tz-caret">expand_more</mat-icon>
      </div>
      <div class="view-toggles">
        <button class="view-btn" [class.active]="currentViewValue === 'day'" (click)="setView('day')">Day</button>
        <button class="view-btn" [class.active]="currentViewValue === 'week'" (click)="setView('week')">Week</button>
        <button class="view-btn" [class.active]="currentViewValue === 'month'" (click)="setView('month')">Month</button>
      </div>
    </div>
  </div>

  <div class="calendar-grid-wrapper">
    <div class="calendar-grid">
      <!-- Header Row -->
      <div class="grid-header">
        <div class="day-name" *ngFor="let day of daysOfWeek" [ngStyle]="{'display': currentViewValue === 'day' ? 'none' : 'block'}">
          {{ day }}
        </div>
      </div>

      <!-- Body Rows -->
      <div class="grid-body" [ngClass]="currentViewValue + '-view'">
        <div class="week-row" *ngFor="let week of filteredWeeksValue">
          <div class="day-cell" *ngFor="let day of week" [class.not-current-month]="!day.isCurrentMonth" [class.today]="day.isToday">
            <div class="day-number">{{ day.date }}<div *ngIf="day.isToday" class="today-dot"></div></div>
            <div class="events-container">
              <div class="event-capsule" 
                   *ngFor="let event of day.events" 
                   (click)="openTaskDetails(event)"
                   [style.backgroundColor]="event.color"
                   [style.color]="event.textLight ? '#fff' : 'var(--text-primary)'">
                {{ event.time }}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Task Details Modal Overlay -->
  <div class="task-overlay-backdrop" *ngIf="selectedEventValue" (click)="closeTaskDetails()">
    <div class="task-details-card" (click)="$event.stopPropagation()">
      <div class="task-details-header" [style.backgroundColor]="selectedEventValue.color"></div>
      <div class="task-details-content">
        <h3 class="task-details-title">{{ selectedEventValue.title }}</h3>
        <div class="task-details-time">
          <mat-icon>schedule</mat-icon>
          <span>{{ selectedEventValue.time }}</span>
          <span *ngIf="selectedEventValue.status" class="ms-2 badge text-bg-light border">{{ selectedEventValue.status }}</span>
        </div>
        <p class="text-secondary small mb-4" *ngIf="selectedEventValue.description">
          {{ selectedEventValue.description }}
        </p>
        <button class="task-details-close" (click)="closeTaskDetails()">Close Details</button>
      </div>
    </div>
  </div>

</div>
