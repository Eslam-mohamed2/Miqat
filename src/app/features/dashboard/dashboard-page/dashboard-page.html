<div class="dashboard-page" @fadeInUp>

  <div class="page-header">
    <div class="header-left" *ngIf="user$ | async as user">
      <h1 class="greeting">Good Morning, {{ user?.firstName || 'User' }}</h1>
      <p class="subtitle">Here's your productivity overview for today.</p>
    </div>
    <div class="header-right">
      <button class="btn-ghost">
        <mat-icon>download</mat-icon> Export
      </button>
      <button class="btn-ghost">Last 7 Days</button>
    </div>
  </div>

  <div class="quick-actions-grid" @staggerCards>
    <app-quick-action-card
      *ngFor="let card of quickActionCards"
      [card]="card"
      (cardClick)="onQuickAction(card)">
    </app-quick-action-card>
  </div>

  <div class="dashboard-grid">
    <div class="left-col">
      <app-productivity-chart [tasks]="(tasks$ | async) || []"></app-productivity-chart>
      <app-recent-workspaces></app-recent-workspaces>
    </div>
    <div class="right-col">
      <app-mini-calendar></app-mini-calendar>
      <app-upcoming-agenda></app-upcoming-agenda>
    </div>
  </div>
</div>
