<div class="calendar-card">
  <div class="cal-header">
    <div class="month">{{ currentMonthName }}</div>
    <div class="actions">
      <div class="btn-nav" (click)="prevMonth()"><mat-icon>chevron_left</mat-icon></div>
      <div class="btn-nav" (click)="nextMonth()"><mat-icon>chevron_right</mat-icon></div>
    </div>
  </div>

  <div class="dow-row">
    <div *ngFor="let dow of daysOfWeek" class="dow">{{ dow }}</div>
  </div>

  <div class="calendar-grid">
    <div *ngFor="let day of grid" 
         class="cal-day" 
         [class.other-month]="day.other"
         [class.today]="day.today"
         [class.has-event]="day.event"
         (click)="onDayClick(day)">
      {{ day.num }}
    </div>
  </div>
</div>
