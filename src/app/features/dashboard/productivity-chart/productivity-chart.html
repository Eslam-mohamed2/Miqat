<div class="chart-card">
  <div class="chart-header">
    <div class="header-left">
      <div class="title">Productivity Flow</div>
      <div class="subtitle">Tasks overview by Status and Priority</div>
    </div>
  </div>
  
  <div class="chart-container" *ngIf="tasks && tasks.length > 0; else emptyState">
    
    <div class="chart-section">
      <h4 class="chart-title">Status</h4>
      <div class="graph-wrapper">
        <ngx-charts-pie-chart
          [scheme]="statusColorScheme"
          [results]="statusData"
          [doughnut]="true"
          [labels]="false"
          [tooltipDisabled]="false">
        </ngx-charts-pie-chart>
      </div>
    </div>

    <div class="chart-section">
      <h4 class="chart-title">Priority</h4>
      <div class="graph-wrapper">
        <ngx-charts-bar-vertical
          [scheme]="priorityColorScheme"
          [results]="priorityData"
          [xAxis]="true"
          [yAxis]="true"
          [showXAxisLabel]="false"
          [showYAxisLabel]="false">
        </ngx-charts-bar-vertical>
      </div>
    </div>

  </div>

  <ng-template #emptyState>
    <div class="empty-state">
      <mat-icon>assessment</mat-icon>
      <p>No task data loaded yet.</p>
    </div>
  </ng-template>
</div>
