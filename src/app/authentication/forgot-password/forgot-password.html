<div class="m-0 p-0 position-relative">
  <div class="row d-flex m-0 p-0">
    <div class="col-12 col-lg-4 p-0 order-2 order-lg-1">
      <div class="auth-container d-flex flex-column justify-content-center align-items-center vh-100 ">
        
        <div class="form-container m-0 w-80 text-center">
          <h3 class="fw-bold mb-3">Forgot Password</h3>
          <p class="text-muted mb-4">Enter your email address and we'll send you an OTP to reset your password.</p>

          @if (errorMessage) {
            <div class="alert alert-danger py-2">{{ errorMessage }}</div>
          }

          <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="text-start">
            <div class="mb-4 text-start">
              <label for="email" class="form-label fw-medium">Email address</label>
              <input type="email" id="email" formControlName="email" class="form-control rounded-0" [class.is-invalid]="isFieldInvalid('email')" />
              <div class="invalid-feedback">A valid email is required.</div>
            </div>

            <div class="d-flex justify-content-center">
              <button type="submit" class="btn text-white bg-image py-2 px-5 my-2 d-flex align-items-center" [disabled]="isLoading">
                @if (isLoading) {
                  <span class="spinner-border spinner-border-sm me-2"></span>
                }
                {{ isLoading ? 'Sending...' : 'Send OTP' }}
              </button>
            </div>
          </form>
          
          <div class="mt-4">
            <a routerLink="/authentication" [queryParams]="{form: 'login'}" class="text-decoration-none fw-bold" style="color: #6a11cb;">Back to Login</a>
          </div>
        </div>

      </div>
    </div>
    <div class="col-12 col-lg-8 p-0 vh-100 m-0 p-0 order-1 order-lg-2">
      <app-flip-clock></app-flip-clock>
    </div>
  </div>
  <div class="position-absolute custom-desgin align-content-center">
      <a href="" class="p-5"><i class="fa-solid fa-house fs-3" routerLink="/home"></i></a>
  </div>
</div>
