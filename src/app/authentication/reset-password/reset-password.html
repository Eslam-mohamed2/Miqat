<div class="m-0 p-0 position-relative">
  <div class="row d-flex m-0 p-0">
    <div class="col-12 col-lg-4 p-0 order-2 order-lg-1">
      <div class="auth-container d-flex flex-column justify-content-center align-items-center vh-100 ">
        
        <div class="form-container m-0 w-80 text-center">
          <h3 class="fw-bold mb-3">Reset Password</h3>
          <p class="text-muted mb-4">Enter your new password below.</p>

          @if (errorMessage) {
            <div class="alert alert-danger py-2">{{ errorMessage }}</div>
          }

          <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="text-start">
            <div class="mb-3 text-start">
              <label for="newPassword" class="form-label fw-medium">New Password</label>
              <div class="position-relative">
                <input id="newPassword" [type]="showPassword ? 'text' : 'password'" formControlName="newPassword" class="form-control rounded-0 pe-5" [class.is-invalid]="isFieldInvalid('newPassword')" />
                <i class="fa-solid position-absolute top-50 translate-middle-y end-0 me-3" style="cursor: pointer; z-index: 10;" [class.fa-eye-slash]="showPassword" [class.fa-eye]="!showPassword" class="text-muted" (click)="togglePassword()"></i>
              </div>
              
              <!-- Password Strength -->
              <div class="mt-2">
                <div class="d-flex gap-1 mb-1">
                  @for (s of [1,2,3,4,5]; track $index) {
                    <div class="flex-grow-1 rounded-1" style="height: 4px;" [ngClass]="strengthScore >= s ? 'bg-success' : 'bg-light'"></div>
                  }
                </div>
                <div class="text-muted" style="font-size: 0.75rem;">
                  <span [class.text-success]="passwordStrength.length">8+ chars</span> &middot;
                  <span [class.text-success]="passwordStrength.upper">Upper</span> &middot;
                  <span [class.text-success]="passwordStrength.lower">Lower</span> &middot;
                  <span [class.text-success]="passwordStrength.number">Number</span> &middot;
                  <span [class.text-success]="passwordStrength.special">Special</span>
                </div>
              </div>
            </div>
            
            <div class="mb-4 text-start">
              <label for="confirmPassword" class="form-label fw-medium">Confirm Password</label>
              <div class="position-relative">
                <input id="confirmPassword" [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword" class="form-control rounded-0 pe-5" [class.is-invalid]="isFieldInvalid('confirmPassword') || (resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched)" />
                <i class="fa-solid position-absolute top-50 translate-middle-y end-0 me-3" style="cursor: pointer; z-index: 10;" [class.fa-eye-slash]="showConfirmPassword" [class.fa-eye]="!showConfirmPassword" class="text-muted" (click)="toggleConfirmPassword()"></i>
              </div>
              @if (resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched) {
                <div class="text-danger mt-1" style="font-size: 0.8rem;">Passwords do not match.</div>
              }
            </div>

            <div class="d-flex justify-content-center">
              <button type="submit" class="btn text-white bg-image py-2 px-5 my-2 d-flex align-items-center" [disabled]="isLoading || resetForm.invalid">
                @if (isLoading) {
                  <span class="spinner-border spinner-border-sm me-2"></span>
                }
                {{ isLoading ? 'Resetting...' : 'Reset Password' }}
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
    <div class="col-12 col-lg-8 p-0 vh-100 m-0 p-0 order-1 order-lg-2">
      <app-flip-clock></app-flip-clock>
    </div>
  </div>
  <div class="position-absolute custom-desgin align-content-center">
      <a href="" class="p-5"><i class="fa-solid fa-house fs-3" routerLink="/home"></i></a>
  </div>
</div>
