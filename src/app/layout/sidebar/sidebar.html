<div class="sidebar" [ngClass]="{'collapsed': isCollapsed()}">
  <div class="logo-section">
    <div class="d-flex align-items-center w-100 justify-content-center header-wrapper">
      <div class="d-flex align-items-center">
        <img src="../../../assets/Logo.png" alt="Miqat" class="logo dark-logo"
          style="max-width: 100px; max-height: 100px;">
        <img src="../../../assets/Light-mode-logo.png" alt="Miqat" class="logo light-logo"
          style="max-width: 100px; max-height: 100px;">
      </div>
    </div>
  </div>

  <div class="nav-groups">
    <div class="nav-group">
      <div class="nav-label">APPLICATION</div>
      <div class="nav-item" *ngFor="let item of navItemsApp" routerLinkActive="active" [routerLink]="item.route">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </div>
    </div>

    <div class="nav-group" style="margin-top: 24px" *ngIf="(groups$ | async) as groups">
      <div class="nav-label-container" (click)="uiService.toggleProjects(true)">
        <div class="nav-label">PINNED PROJECTS</div>
        <mat-icon class="label-icon">settings_overscan</mat-icon>
      </div>

      <div class="nav-item" *ngFor="let group of groups" (click)="uiService.openProjectDetails(group.id)">
        <div class="dot" [style.backgroundColor]="group.color || '#2ec4a0'"
          style="width: 8px; height: 8px; border-radius: 50%; margin-right: 8px;"></div>
        <span>{{ group.name }}</span>
      </div>

      <div class="nav-item new-project-btn" (click)="uiService.toggleProjects(true)">
        <mat-icon>add_circle_outline</mat-icon>
        <span>New Project</span>
      </div>
    </div>

    <div class="nav-group" style="margin-top: 24px">
      <div class="nav-label">OTHERS</div>
      <div class="nav-item" *ngFor="let item of navItemsOther" routerLinkActive="active" [routerLink]="item.route">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </div>
    </div>
  </div>

  <div class="nav-item toggle-btn-wrapper" (click)="toggleSidebar()">
    <mat-icon class="toggle-icon">menu_open</mat-icon>
    <span>Collapse</span>
  </div>

  <div class="bottom-section">
    <div class="nav-item logout-btn" (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </div>

    <div class="user-profile" *ngIf="(user$ | async) as user" [routerLink]="['/settings']">
      <div class="avatar-placeholder">
        <img *ngIf="user.avatarUrl" [src]="user.avatarUrl" width="100%" height="100%" [style.borderRadius]="'50%'">
      </div>
      <div class="user-info">
        <div class="user-name">{{ user.firstName }} {{ user.lastName }}</div>
        <div class="user-email">{{ user.email }}</div>
      </div>
      <mat-icon class="chevron">chevron_right</mat-icon>
    </div>
  </div>
</div>
