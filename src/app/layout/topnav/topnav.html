<div class="topnav">
  <div class="search-container">
    <mat-icon class="search-icon">search</mat-icon>
    <input type="text" placeholder="Search tasks, nodes, or events (Cmd+K)" />
  </div>
  
  <div class="right-actions">
    <button class="btn-quick-add" (click)="onQuickAdd()">+ Quick Add</button>
    
    <div class="action-btn" (click)="uiService.toggleProjects()" [class.active]="uiService.projectsPanelOpen()">
      <mat-icon>folder_special</mat-icon>
      <span class="tooltip">Projects</span>
    </div>

    <div class="action-btn" routerLink="/friends" routerLinkActive="active">
      <mat-icon>people</mat-icon>
      <div class="badge" *ngIf="(pendingFriendsCount$ | async) as count; else emptyBadgeFriends" [style.display]="count > 0 ? 'flex' : 'none'">
        {{ count > 9 ? '9+' : count }}
      </div>
      <ng-template #emptyBadgeFriends></ng-template>
      <span class="tooltip">Friends</span>
    </div>

    <div class="action-btn" routerLink="/mentions" routerLinkActive="active">
      <mat-icon>alternate_email</mat-icon>
      <div class="badge" *ngIf="(unreadMentionsCount$ | async) as count; else emptyBadgeMentions" [style.display]="count > 0 ? 'flex' : 'none'">
        {{ count > 9 ? '9+' : count }}
      </div>
      <ng-template #emptyBadgeMentions></ng-template>
      <span class="tooltip">Mentions</span>
    </div>

    <div class="action-btn" routerLink="/notifications" routerLinkActive="active">
      <mat-icon>notifications</mat-icon>
      <div class="badge" *ngIf="(unreadCount$ | async) as count; else emptyBadge" [style.display]="count > 0 ? 'flex' : 'none'">
        {{ count > 9 ? '9+' : count }}
      </div>
      <ng-template #emptyBadge></ng-template>
      <span class="tooltip">Notifications</span>
    </div>

    <div class="action-btn" (click)="themeService.toggleTheme()">
      <mat-icon>{{ themeService.getTheme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      <span class="tooltip">Theme</span>
    </div>
  </div>
</div>

<!-- Overlay Panels -->
<app-projects-panel 
  [isOpen]="uiService.projectsPanelOpen()" 
  (closed)="uiService.projectsPanelOpen.set(false)">
</app-projects-panel>
